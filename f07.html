<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Só Rio · F07 Cover Magazine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700;800&family=Cormorant+Garamond:ital,wght@1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="_shared/branding.js"></script>
<script src="_shared/editor.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; background: #1C1C1A; }
  .canvas { width: 1080px; height: 1350px; position: relative; overflow: hidden; font-family: 'Inter', sans-serif; }

  .hero-band {
    position: absolute;
    top: 0; left: 0; right: 0;
    background-size: cover;
    background-position: center;
    z-index: 1;
  }
  .bottom-band {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 2;
    padding: 60px 60px 70px 60px;
    color: #F6F1E7;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .logo {
    position: absolute; top: 60px; left: 60px;
    z-index: 4;
    width: 170px;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.50));
  }
  .selo {
    position: absolute; top: 60px; right: 60px;
    z-index: 4;
    width: 180px; height: 180px;
    filter: drop-shadow(0 2px 12px rgba(0,0,0,0.55));
  }

  .info-top {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    opacity: 0.92;
    margin-bottom: 22px;
  }
  .display-cover {
    font-family: 'Oswald', sans-serif;
    font-weight: 800;
    line-height: 0.86;
    letter-spacing: 0;
    text-transform: uppercase;
    color: #F6F1E7;
  }
  .accent {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    line-height: 1.05;
    color: #C89853;
    margin-top: 22px;
  }
  .info-bottom {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    letter-spacing: 0.40em;
    text-transform: uppercase;
    color: #C89853;
    margin-top: 18px;
    opacity: 0.92;
    font-size: 14px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="canvas" id="canvas">
  <div class="hero-band" id="hero" data-layer="hero"></div>
  <img class="logo" id="logo" data-layer="logo" alt="Só Rio">
  <img class="selo" id="selo" data-layer="selo" alt="Selo Só Rio">
  <div class="bottom-band" id="bottom-band">
    <div>
      <div class="info-top" id="info-top" data-layer="info_top"></div>
      <div class="display-cover" id="display-cover" data-layer="title"></div>
      <div class="accent" id="accent" data-layer="accent"></div>
    </div>
    <div class="info-bottom" id="info-bottom" data-layer="info_bottom"></div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  function get(k, d) { var v = p.get(k); return (v === null || v === "") ? d : v; }
  function bool(k, d) { var v = p.get(k); if (v === null) return d; return v === "1" || v === "true"; }
  function num(k, d) { var v = p.get(k); if (v === null || v === "") return d; var n = parseFloat(v); return isNaN(n) ? d : n; }

  var format = get('format', '1080x1350');
  var fmtParts = format.split('x');
  var canvasW = parseInt(fmtParts[0], 10) || 1080;
  var canvasH = parseInt(fmtParts[1], 10) || 1350;
  document.documentElement.style.width = canvasW + 'px';
  document.documentElement.style.height = canvasH + 'px';
  document.body.style.width = canvasW + 'px';
  document.body.style.height = canvasH + 'px';
  var canvas = document.getElementById('canvas');
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  var heightScale = canvasH / 1350;
  var widthScale = canvasW / 1080;

  var hero = get('hero', 'assets/hero-sample.png');
  var logo = get('logo', 'assets/logo.png');
  var selo = get('selo', 'assets/selo-default.png');
  var title = get('title', 'Cloud|Dance');
  var infoTop = get('info_top', 'Vodka · Pera · Bianco · Baunilha');
  var accent = get('accent', 'Calmo, dourado, nosso.');
  var infoBottom = get('info_bottom', 'Valada do Ribatejo · sorio.pt');

  var heroHeightPct = num('hero_height_pct', 0.65);
  heroHeightPct = Math.max(0.55, Math.min(0.75, heroHeightPct));
  var bgColor = get('bg_color', '#3F5548');
  var displaySize = num('display_size', Math.round(180 * heightScale));
  var accentSize = num('accent_size', Math.round(50 * heightScale));
  var heroPosition = get('hero_position', 'center');

  var showLogo = bool('show_logo', true);
  var showSelo = bool('show_selo', true);
  var showInfoTop = bool('show_info_top', true);
  var showAccent = bool('show_accent', true);
  var showInfoBottom = bool('show_info_bottom', true);

  var heroPx = Math.round(canvasH * heroHeightPct);
  var bottomPx = canvasH - heroPx;

  var heroEl = document.getElementById('hero');
  heroEl.style.backgroundImage = 'url("' + hero + '")';
  heroEl.style.backgroundPosition = heroPosition;
  heroEl.style.height = heroPx + 'px';

  var bottomEl = document.getElementById('bottom-band');
  bottomEl.style.background = bgColor;
  bottomEl.style.height = bottomPx + 'px';

  // Logo + selo
  var logoEl = document.getElementById('logo');
  var seloEl = document.getElementById('selo');
  logoEl.src = logo;
  logoEl.style.width = Math.round(170 * heightScale) + 'px';
  logoEl.style.top = Math.round(60 * heightScale) + 'px';
  logoEl.style.left = Math.round(60 * widthScale) + 'px';
  seloEl.src = selo;
  seloEl.style.width = Math.round(180 * heightScale) + 'px';
  seloEl.style.height = Math.round(180 * heightScale) + 'px';
  seloEl.style.top = Math.round(60 * heightScale) + 'px';
  seloEl.style.right = Math.round(60 * widthScale) + 'px';
  if (!showLogo) logoEl.classList.add('hidden');
  if (!showSelo) seloEl.classList.add('hidden');

  document.getElementById('info-top').textContent = infoTop;
  var displayEl = document.getElementById('display-cover');
  displayEl.innerHTML = title.split('|').map(function(l){
    return l.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }).join('<br>');
  displayEl.style.fontSize = displaySize + 'px';
  document.getElementById('accent').textContent = accent;
  document.getElementById('accent').style.fontSize = accentSize + 'px';
  document.getElementById('info-bottom').textContent = infoBottom;
  document.getElementById('info-top').style.fontSize = Math.round(18 * heightScale) + 'px';
  document.getElementById('info-bottom').style.fontSize = Math.round(14 * heightScale) + 'px';

  if (!showInfoTop) document.getElementById('info-top').classList.add('hidden');
  if (!showAccent) document.getElementById('accent').classList.add('hidden');
  if (!showInfoBottom) document.getElementById('info-bottom').classList.add('hidden');
  // Universal branding override — lê logo_position/scale + selo_position/scale do URL
  if (typeof applyBranding === 'function') {
    applyBranding({ canvasW, canvasH, heightScale, widthScale, p, logo, selo });
  }

  // Universal editor module — z-index, cor por campo, transforms (x/y/rot/scale)
  // + postMessage protocol para Boldy editor interactivo.
  if (typeof applyEditor === 'function') {
    applyEditor({
      canvasW: canvasW,
      canvasH: canvasH,
      p: p,
      layers: ['hero', 'title', 'accent', 'info_top', 'info_bottom', 'logo', 'selo'],
    });
  }
})();
</script>
</body>
</html>
