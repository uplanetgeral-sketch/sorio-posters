<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Só Rio · F02 Full-Color Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background:#1C1C1A;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }
  .canvas {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: #1C1C1A;
    font-family: 'Inter', sans-serif;
    color: #F6F1E7;
  }
  .hero {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
  }
  .overlay {
    position: absolute;
    inset: 0;
  }
  .masthead-top {
    position: absolute;
    top: 70px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 3;
    height: 220px;
  }
  .logo {
    width: 200px;
    height: auto;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.35));
  }
  .selo {
    width: 220px;
    height: 220px;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.40));
  }
  .masthead-bottom {
    position: absolute;
    bottom: 70px;
    left: 80px;
    right: 80px;
    z-index: 3;
    text-align: center;
  }
  .info {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.28em;
    color: #F6F1E7;
    text-transform: uppercase;
    opacity: 0.95;
  }
  .info-top { margin-bottom: 28px; }
  .info-bottom {
    margin-top: 34px;
    color: #C89853;
    font-size: 18px;
    letter-spacing: 0.36em;
  }
  .display-hero {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    line-height: 0.95;
    letter-spacing: 0.005em;
    text-transform: uppercase;
    color: #F6F1E7;
    text-shadow: 0 2px 18px rgba(0,0,0,0.35);
  }
  .accent {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    line-height: 1.05;
    color: #C89853;
    margin-top: 22px;
    letter-spacing: 0.005em;
  }
  .wave {
    width: 140px;
    height: 20px;
    margin: 26px auto 0;
    display: block;
    opacity: 0.80;
  }
  .hairline {
    width: 56px;
    height: 1.4px;
    background: #C89853;
    margin: 0 auto 22px;
    opacity: 0.75;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="canvas" id="canvas">
  <div class="hero" id="hero"></div>
  <div class="overlay" id="overlay"></div>

  <div class="masthead-top" id="masthead-top">
    <img class="logo" id="logo" alt="Só Rio">
    <img class="selo" id="selo" alt="Selo Só Rio">
  </div>

  <div class="masthead-bottom">
    <div class="hairline" id="hairline"></div>
    <div class="info info-top" id="info-top"></div>
    <div class="display-hero" id="display-hero"></div>
    <svg class="wave" id="wave" viewBox="0 0 140 20" xmlns="http://www.w3.org/2000/svg" fill="none">
      <path d="M1 10 Q 18 1, 35 10 T 70 10 T 105 10 T 139 10"
            stroke="#C89853" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <div class="accent" id="accent"></div>
    <div class="info info-bottom" id="info-bottom"></div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  function get(k, d) { var v = p.get(k); return (v === null || v === "") ? d : v; }
  function bool(k, d) { var v = p.get(k); if (v === null) return d; return v === "1" || v === "true"; }
  function num(k, d) { var v = p.get(k); if (v === null || v === "") return d; var n = parseFloat(v); return isNaN(n) ? d : n; }

  // === ASSETS ===
  var hero = get('hero', 'assets/hero-sample.png');
  var logo = get('logo', 'assets/logo.png');
  var selo = get('selo', 'assets/selo-default.png');

  // === COPY (PT-PT defaults — Blueprint Só Rio v1.5) ===
  var title = get('title', 'Caipirinha|de Maracujá');        // '|' = line break
  var infoTop = get('info_top', 'Maracujá · Lima · Cachaça · Mel do Ribatejo');
  var accent = get('accent', 'Sem pressa. Com rio.');
  var infoBottom = get('info_bottom', 'Valada do Ribatejo · sorio.pt');

  // === VISIBILITY ===
  var showLogo = bool('show_logo', true);
  var showSelo = bool('show_selo', true);
  var showHairline = bool('show_hairline', true);
  var showWave = bool('show_wave', true);
  var showInfoTop = bool('show_info_top', true);
  var showInfoBottom = bool('show_info_bottom', true);
  var showAccent = bool('show_accent', true);

  // === TYPOGRAPHY SIZES (overridable for long titles / short product names) ===
  var displaySize = num('display_size', 108);    // px
  var accentSize = num('accent_size', 46);       // px

  // === OVERLAY INTENSITY ===
  // 0.0 = no darkening, 1.0 = full default gradient, >1 = darker than default
  var overlayStrength = num('overlay_strength', 1.0);

  // === HERO FRAMING ===
  var heroPosition = get('hero_position', 'center'); // e.g. "center", "50% 40%", "top", etc.

  // === OUTPUT FORMAT (responsive canvas) ===
  // formats supported: "1080x1080" (1:1), "1080x1350" (4:5 default), "1080x1920" (9:16)
  var format = get('format', '1080x1350');
  var fmtParts = format.split('x');
  var canvasW = parseInt(fmtParts[0], 10) || 1080;
  var canvasH = parseInt(fmtParts[1], 10) || 1350;

  // === APPLY ===
  var canvas = document.getElementById('canvas');
  document.documentElement.style.width = canvasW + 'px';
  document.documentElement.style.height = canvasH + 'px';
  document.body.style.width = canvasW + 'px';
  document.body.style.height = canvasH + 'px';
  if (canvas) {
    canvas.style.width = canvasW + 'px';
    canvas.style.height = canvasH + 'px';
  }

  // === SCALE FACTOR baseado em canvasH ===
  // base 4:5 (1350h) → scale 1.00
  // 1:1 (1080h) → scale 0.80 (canvas mais pequeno → tipo proporcionalmente menor)
  // 9:16 (1920h) → scale 1.42 (canvas maior + vertical → tipo bem maior)
  var heightScale = canvasH / 1350;

  // Reposicionar masthead-top + masthead-bottom proporcionalmente à altura
  // 5.2% top/bottom mantém o ritmo visual entre formatos
  var marginTop = Math.round(canvasH * 0.052);
  var marginBottom = Math.round(canvasH * 0.052);
  var sideMargin = Math.round(canvasW * 0.074); // 80px @ 1080w → 7.4% (constante)
  var topEl = document.querySelector('.masthead-top');
  var botEl = document.querySelector('.masthead-bottom');
  if (topEl) {
    topEl.style.top = marginTop + 'px';
    topEl.style.left = sideMargin + 'px';
    topEl.style.right = sideMargin + 'px';
    topEl.style.height = Math.round(220 * heightScale) + 'px';
  }
  if (botEl) {
    botEl.style.bottom = marginBottom + 'px';
    botEl.style.left = sideMargin + 'px';
    botEl.style.right = sideMargin + 'px';
  }

  // Logo e selo escalam proporcionalmente
  var logoEl = document.getElementById('logo');
  var seloEl = document.getElementById('selo');
  logoEl.style.width = Math.round(200 * heightScale) + 'px';
  seloEl.style.width = Math.round(220 * heightScale) + 'px';
  seloEl.style.height = Math.round(220 * heightScale) + 'px';

  var heroEl = document.getElementById('hero');
  heroEl.style.backgroundImage = 'url("' + hero + '")';
  heroEl.style.backgroundPosition = heroPosition;

  // === OVERLAY · re-equilibrado por aspect ratio ===
  // 4:5 (vertical moderado) → bottom escuro arranca ~55% (palco standard)
  // 1:1 (square) → arranca ~50% (mais palco para tipo)
  // 9:16 (vertical alto) → arranca ~63% (mais hero visível, tipo só na zona inferior)
  var aspectRatio = canvasH / canvasW;
  // aspect 1.25 (4:5) → 55% · 1.00 (1:1) → 50% · 1.78 (9:16) → 63%
  var aspectAdjust = (aspectRatio - 1.25) * 15; // 4:5 → 0 · 9:16 → +7.95
  var overlayEl = document.getElementById('overlay');
  var s = overlayStrength;
  var breakStart = Math.max(15, 18 + aspectAdjust * 0.8);     // 9:16 → 24%
  var breakMid = Math.max(40, 55 - (s - 1.0) * 25 + aspectAdjust); // 4:5 s=1 → 55% · 9:16 s=1 → 63%
  var s72 = 72 - (s - 1.0) * 8 + aspectAdjust * 0.6;          // ajusta zona dark
  var alpha72 = Math.min(1, 0.45 * s);
  var alpha90 = Math.min(1, 0.85 * s);
  var alpha100 = Math.min(1, 0.95 * s);
  overlayEl.style.background =
    'linear-gradient(180deg,' +
      'rgba(28,28,26,' + (0.35 * s).toFixed(3) + ') 0%,' +
      'rgba(28,28,26,0.00) ' + breakStart.toFixed(1) + '%,' +
      'rgba(28,28,26,0.00) ' + breakMid.toFixed(1) + '%,' +
      'rgba(28,28,26,' + alpha72.toFixed(3) + ') ' + s72.toFixed(1) + '%,' +
      'rgba(28,28,26,' + alpha90.toFixed(3) + ') 90%,' +
      'rgba(28,28,26,' + alpha100.toFixed(3) + ') 100%' +
    ')';

  logoEl.src = logo;
  seloEl.src = selo;
  if (!showLogo) logoEl.classList.add('hidden');
  if (!showSelo) seloEl.classList.add('hidden');

  document.getElementById('info-top').textContent = infoTop;
  document.getElementById('accent').textContent = accent;
  document.getElementById('info-bottom').textContent = infoBottom;

  // === TIPOGRAFIA · escalada por heightScale ===
  // displaySize / accentSize default são para 4:5 (108 / 46).
  // Outros formatos multiplicam por heightScale, a não ser que user passe override explícito.
  var userPassedDisplay = p.has('display_size');
  var userPassedAccent = p.has('accent_size');
  var displaySizeScaled = userPassedDisplay ? displaySize : Math.round(displaySize * heightScale);
  var accentSizeScaled = userPassedAccent ? accentSize : Math.round(accentSize * heightScale);

  var displayEl = document.getElementById('display-hero');
  displayEl.innerHTML = title.split('|').map(function(l) {
    return l.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }).join('<br>');
  displayEl.style.fontSize = displaySizeScaled + 'px';

  document.getElementById('accent').style.fontSize = accentSizeScaled + 'px';

  // Info-top / info-bottom também escalam (defaults 22 / 18 px @ 4:5)
  document.getElementById('info-top').style.fontSize = Math.round(22 * heightScale) + 'px';
  document.getElementById('info-bottom').style.fontSize = Math.round(18 * heightScale) + 'px';

  // Wave + hairline escalam também
  var waveEl = document.getElementById('wave');
  if (waveEl) {
    waveEl.style.width = Math.round(140 * heightScale) + 'px';
    waveEl.style.height = Math.round(20 * heightScale) + 'px';
    waveEl.style.marginTop = Math.round(26 * heightScale) + 'px';
  }
  var hairlineEl = document.getElementById('hairline');
  if (hairlineEl) {
    hairlineEl.style.width = Math.round(56 * heightScale) + 'px';
    hairlineEl.style.marginBottom = Math.round(22 * heightScale) + 'px';
  }

  if (!showHairline) document.getElementById('hairline').classList.add('hidden');
  if (!showWave) document.getElementById('wave').classList.add('hidden');
  if (!showInfoTop) document.getElementById('info-top').classList.add('hidden');
  if (!showInfoBottom) document.getElementById('info-bottom').classList.add('hidden');
  if (!showAccent) document.getElementById('accent').classList.add('hidden');
})();
</script>
</body>
</html>
