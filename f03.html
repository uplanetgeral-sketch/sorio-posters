<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Só Rio · F03 Action & Motion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background:#3F5548;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }
  /* Canvas — fundo flat por default (FAM-F03-01: nunca wood deck texturizado) */
  .canvas {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    color: #F6F1E7;
  }
  .hero {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
  }
  /* Overlay subtilíssimo só para legibilidade da tipografia bottom-left */
  .overlay {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .masthead-top {
    position: absolute;
    top: 70px; left: 80px; right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 3;
    height: 200px;
  }
  .logo {
    width: 180px;
    height: auto;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.40));
  }
  .selo {
    width: 200px;
    height: 200px;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.45));
  }
  /* TÍTULO — bottom-LEFT, não centrado (COMP-04 asymmetry) */
  .masthead-bottom {
    position: absolute;
    bottom: 90px; left: 80px;
    z-index: 3;
    max-width: 720px;
    text-align: left;
  }
  .info {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 21px;
    letter-spacing: 0.28em;
    color: #F6F1E7;
    text-transform: uppercase;
    opacity: 0.95;
  }
  .info-top { margin-bottom: 22px; }
  .info-bottom {
    margin-top: 26px;
    color: #C89853;
    font-size: 16px;
    letter-spacing: 0.36em;
  }
  .display-hero {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    line-height: 0.9;
    letter-spacing: 0.005em;
    text-transform: uppercase;
    color: #F6F1E7;
    text-shadow: 0 2px 16px rgba(0,0,0,0.50);
  }
  .accent {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    line-height: 1.05;
    color: #C89853;
    margin-top: 18px;
  }
  .hairline {
    width: 56px;
    height: 1.4px;
    background: #C89853;
    margin: 0 0 20px;
    opacity: 0.85;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="canvas" id="canvas">
  <div class="hero" id="hero"></div>
  <div class="overlay" id="overlay"></div>

  <div class="masthead-top">
    <img class="logo" id="logo" alt="Só Rio">
    <img class="selo" id="selo" alt="Selo Só Rio">
  </div>

  <div class="masthead-bottom">
    <div class="hairline" id="hairline"></div>
    <div class="info info-top" id="info-top"></div>
    <div class="display-hero" id="display-hero"></div>
    <div class="accent" id="accent"></div>
    <div class="info info-bottom" id="info-bottom"></div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  function get(k, d) { var v = p.get(k); return (v === null || v === "") ? d : v; }
  function bool(k, d) { var v = p.get(k); if (v === null) return d; return v === "1" || v === "true"; }
  function num(k, d) { var v = p.get(k); if (v === null || v === "") return d; var n = parseFloat(v); return isNaN(n) ? d : n; }

  // Background flat color (FAM-F03-01)
  var bgColor = get('bg_color', '#3F5548');
  document.body.style.background = bgColor;
  document.getElementById('canvas').style.background = bgColor;

  var hero = get('hero', 'assets/hero-sample.png');
  var logo = get('logo', 'assets/logo.png');
  var selo = get('selo', 'assets/selo-default.png');

  var title = get('title', 'Esmeralda');
  var infoTop = get('info_top', 'Hortelã · Pepino · Lima');
  var accent = get('accent', 'O verão tem ritmo.');
  var infoBottom = get('info_bottom', 'Valada do Ribatejo · sorio.pt');

  var showLogo = bool('show_logo', true);
  var showSelo = bool('show_selo', true);
  var showHairline = bool('show_hairline', true);
  var showAccent = bool('show_accent', true);
  var showInfoTop = bool('show_info_top', true);
  var showInfoBottom = bool('show_info_bottom', true);

  var displaySize = num('display_size', 110);
  var accentSize = num('accent_size', 38);
  var overlayStrength = num('overlay_strength', 0.35);
  var heroPosition = get('hero_position', 'center');
  var titleAlign = get('title_align', 'left');
  var titleSide = get('title_side', 'left');

  document.getElementById('hero').style.backgroundImage = 'url("' + hero + '")';
  document.getElementById('hero').style.backgroundPosition = heroPosition;

  // Subtle bottom-left overlay for typography legibility
  var s = overlayStrength;
  document.getElementById('overlay').style.background =
    'radial-gradient(ellipse at bottom left,' +
      'rgba(28,28,26,' + (0.55 * s) + ') 0%,' +
      'rgba(28,28,26,' + (0.30 * s) + ') 30%,' +
      'rgba(28,28,26,0) 60%' +
    ')';

  document.getElementById('logo').src = logo;
  document.getElementById('selo').src = selo;
  if (!showLogo) document.getElementById('logo').classList.add('hidden');
  if (!showSelo) document.getElementById('selo').classList.add('hidden');

  // Switch title side if requested
  var mb = document.querySelector('.masthead-bottom');
  if (titleSide === 'right') { mb.style.left = 'auto'; mb.style.right = '80px'; mb.style.textAlign = 'right'; }
  else if (titleSide === 'center') { mb.style.left = '80px'; mb.style.right = '80px'; mb.style.textAlign = 'center'; mb.style.maxWidth = 'none'; }
  if (titleAlign && (titleAlign === 'left' || titleAlign === 'right' || titleAlign === 'center')) {
    mb.style.textAlign = titleAlign;
  }
  if (mb.style.textAlign === 'center' || mb.style.textAlign === 'right') {
    document.getElementById('hairline').style.margin = '0 auto 20px';
  }

  document.getElementById('info-top').textContent = infoTop;
  var displayEl = document.getElementById('display-hero');
  displayEl.innerHTML = title.split('|').map(function(l){
    return l.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }).join('<br>');
  displayEl.style.fontSize = displaySize + 'px';
  document.getElementById('accent').textContent = accent;
  document.getElementById('accent').style.fontSize = accentSize + 'px';
  document.getElementById('info-bottom').textContent = infoBottom;

  if (!showHairline) document.getElementById('hairline').classList.add('hidden');
  if (!showAccent) document.getElementById('accent').classList.add('hidden');
  if (!showInfoTop) document.getElementById('info-top').classList.add('hidden');
  if (!showInfoBottom) document.getElementById('info-bottom').classList.add('hidden');
})();
</script>
</body>
</html>
