<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Só Rio · F06 Type-as-Subject</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700;800;900&family=Cormorant+Garamond:ital,wght@1,500&family=Inter:wght@500&display=swap" rel="stylesheet">
<script src="_shared/branding.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; background: #6B4A2D; }
  .canvas { width: 1080px; height: 1350px; position: relative; overflow: hidden; font-family: 'Inter', sans-serif; }

  .type-pattern {
    position: absolute; inset: 0;
    z-index: 1;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.85;
    letter-spacing: -0.005em;
    text-align: center;
    overflow: hidden;
    user-select: none;
  }
  .type-pattern__line {
    white-space: nowrap;
    width: 110%;
    text-align: center;
  }

  .hero {
    position: absolute;
    z-index: 3;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.35));
  }

  .logo {
    position: absolute;
    top: 60px; left: 60px;
    z-index: 4;
    width: 150px; height: auto;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.40));
  }
  .selo {
    position: absolute;
    top: 60px; right: 60px;
    z-index: 4;
    width: 150px; height: 150px;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.45));
  }

  .label-bottom {
    position: absolute;
    bottom: 60px; left: 60px; right: 60px;
    z-index: 5;
    text-align: center;
    color: #F6F1E7;
  }
  .info-bottom {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.92;
  }
  .accent-below {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 28px;
    color: #C89853;
    line-height: 1.1;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="canvas" id="canvas">
  <div class="type-pattern" id="type-pattern"></div>
  <img class="logo" id="logo" alt="Só Rio">
  <img class="selo" id="selo" alt="Selo Só Rio">
  <div class="hero" id="hero"></div>
  <div class="label-bottom" id="label-bottom">
    <div class="info-bottom" id="info-bottom"></div>
    <div class="accent-below" id="accent-below"></div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  function get(k, d) { var v = p.get(k); return (v === null || v === "") ? d : v; }
  function bool(k, d) { var v = p.get(k); if (v === null) return d; return v === "1" || v === "true"; }
  function num(k, d) { var v = p.get(k); if (v === null || v === "") return d; var n = parseFloat(v); return isNaN(n) ? d : n; }

  var format = get('format', '1080x1350');
  var fmtParts = format.split('x');
  var canvasW = parseInt(fmtParts[0], 10) || 1080;
  var canvasH = parseInt(fmtParts[1], 10) || 1350;
  document.documentElement.style.width = canvasW + 'px';
  document.documentElement.style.height = canvasH + 'px';
  document.body.style.width = canvasW + 'px';
  document.body.style.height = canvasH + 'px';
  var canvas = document.getElementById('canvas');
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  var heightScale = canvasH / 1350;
  var widthScale = canvasW / 1080;

  var hero = get('hero', 'assets/hero-sample.png');
  var logo = get('logo', 'assets/logo.png');
  var selo = get('selo', 'assets/selo-default.png');
  var title = get('title', 'Cloud|Dance');
  var infoBottom = get('info_bottom', 'Vodka · Pera · Bianco · Baunilha');
  var accent = get('accent', 'Calmo, dourado, nosso.');

  var bgColor = get('bg_color', '#6B4A2D');
  var typePatternColor = get('type_pattern_color', '#F6F1E7');
  var typePatternOpacity = num('type_pattern_opacity', 0.18);
  var subjectScale = num('subject_scale', 0.72);
  var subjectPosition = get('subject_position', 'center');
  var displaySize = num('display_size', Math.round(280 * heightScale));

  var showLogo = bool('show_logo', true);
  var showSelo = bool('show_selo', true);
  var showInfoBottom = bool('show_info_bottom', true);
  var showAccent = bool('show_accent', true);

  document.body.style.background = bgColor;
  canvas.style.background = bgColor;

  // Type pattern — 4-6 linhas do título repetidas verticalmente
  var firstLine = title.split('|')[0];
  var lineCount = Math.max(4, Math.round(canvasH / (displaySize * 1.05)));
  var patternEl = document.getElementById('type-pattern');
  patternEl.style.color = typePatternColor;
  patternEl.style.opacity = typePatternOpacity;
  patternEl.style.fontSize = displaySize + 'px';
  patternEl.innerHTML = '';
  for (var i = 0; i < lineCount; i++) {
    var d = document.createElement('div');
    d.className = 'type-pattern__line';
    d.textContent = firstLine.toUpperCase();
    patternEl.appendChild(d);
  }

  // Hero placement (subject ideally PNG with transparent bg)
  var heroEl = document.getElementById('hero');
  heroEl.style.backgroundImage = 'url("' + hero + '")';
  var subjectW = Math.round(canvasW * subjectScale);
  var subjectH = Math.round(canvasH * subjectScale * 1.15); // slightly taller to crop edges
  heroEl.style.width = subjectW + 'px';
  heroEl.style.height = subjectH + 'px';
  // Position: center default. Other modes: 'top', 'bottom', 'right', 'left'
  if (subjectPosition === 'top') {
    heroEl.style.top = Math.round(canvasH * 0.10) + 'px';
    heroEl.style.left = Math.round((canvasW - subjectW) / 2) + 'px';
  } else if (subjectPosition === 'bottom') {
    heroEl.style.bottom = Math.round(canvasH * 0.08) + 'px';
    heroEl.style.left = Math.round((canvasW - subjectW) / 2) + 'px';
  } else if (subjectPosition === 'right') {
    heroEl.style.top = Math.round((canvasH - subjectH) / 2) + 'px';
    heroEl.style.right = Math.round(canvasW * 0.05) + 'px';
  } else if (subjectPosition === 'left') {
    heroEl.style.top = Math.round((canvasH - subjectH) / 2) + 'px';
    heroEl.style.left = Math.round(canvasW * 0.05) + 'px';
  } else {
    heroEl.style.top = Math.round((canvasH - subjectH) / 2) + 'px';
    heroEl.style.left = Math.round((canvasW - subjectW) / 2) + 'px';
  }

  // Logo + selo escalados
  var logoEl = document.getElementById('logo');
  var seloEl = document.getElementById('selo');
  logoEl.src = logo;
  logoEl.style.width = Math.round(150 * heightScale) + 'px';
  logoEl.style.top = Math.round(60 * heightScale) + 'px';
  logoEl.style.left = Math.round(60 * widthScale) + 'px';
  seloEl.src = selo;
  seloEl.style.width = Math.round(150 * heightScale) + 'px';
  seloEl.style.height = Math.round(150 * heightScale) + 'px';
  seloEl.style.top = Math.round(60 * heightScale) + 'px';
  seloEl.style.right = Math.round(60 * widthScale) + 'px';
  if (!showLogo) logoEl.classList.add('hidden');
  if (!showSelo) seloEl.classList.add('hidden');

  // Bottom labels
  document.getElementById('info-bottom').textContent = infoBottom;
  document.getElementById('accent-below').textContent = accent;
  document.getElementById('info-bottom').style.fontSize = Math.round(18 * heightScale) + 'px';
  document.getElementById('accent-below').style.fontSize = Math.round(28 * heightScale) + 'px';
  if (!showInfoBottom) document.getElementById('info-bottom').classList.add('hidden');
  if (!showAccent) document.getElementById('accent-below').classList.add('hidden');
  // Universal branding override — lê logo_position/scale + selo_position/scale do URL
  if (typeof applyBranding === 'function') {
    applyBranding({ canvasW, canvasH, heightScale, widthScale, p, logo, selo });
  }
})();
</script>
</body>
</html>
