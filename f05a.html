<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Só Rio · F05a Editorial Grid Flat-Lay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background: #F6F1E7;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }
  .canvas {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #F6F1E7;
    font-family: 'Inter', sans-serif;
    color: #1C1C1A;
    padding: 80px;
  }
  .masthead-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 110px;
    margin-bottom: 32px;
  }
  .logo {
    width: 130px;
    height: auto;
  }
  .editorial-label {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.42em;
    color: #6B4A2D;
    text-transform: uppercase;
    text-align: right;
  }
  /* GRID 2x2 — alinhamento estrito */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 18px;
    height: 880px;
  }
  .cell {
    background: #1C1C1A;
    border-radius: 0;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .cell-image {
    flex: 1;
    background-size: cover;
    background-position: center;
    min-height: 0;
  }
  .cell-caption {
    background: #1C1C1A;
    padding: 14px 22px;
    color: #F6F1E7;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-weight: 500;
  }
  /* FOOTER */
  .footer {
    margin-top: 36px;
    text-align: center;
  }
  .display-hero {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 64px;
    line-height: 0.95;
    letter-spacing: 0.005em;
    text-transform: uppercase;
    color: #1C1C1A;
    margin-bottom: 8px;
  }
  .accent {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 26px;
    color: #6B4A2D;
    margin-bottom: 14px;
  }
  .hairline {
    width: 42px;
    height: 1px;
    background: #6B4A2D;
    margin: 0 auto 18px;
    opacity: 0.6;
  }
  .info-bottom {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.42em;
    color: #6B4A2D;
    text-transform: uppercase;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="canvas">

  <div class="masthead-top">
    <img class="logo" id="logo" alt="Só Rio">
    <div class="editorial-label" id="editorial-label"></div>
  </div>

  <div class="grid">
    <div class="cell" id="cell-1">
      <div class="cell-image" id="img-1"></div>
      <div class="cell-caption" id="cap-1"></div>
    </div>
    <div class="cell" id="cell-2">
      <div class="cell-image" id="img-2"></div>
      <div class="cell-caption" id="cap-2"></div>
    </div>
    <div class="cell" id="cell-3">
      <div class="cell-image" id="img-3"></div>
      <div class="cell-caption" id="cap-3"></div>
    </div>
    <div class="cell" id="cell-4">
      <div class="cell-image" id="img-4"></div>
      <div class="cell-caption" id="cap-4"></div>
    </div>
  </div>

  <div class="footer">
    <div class="hairline" id="hairline"></div>
    <div class="display-hero" id="title"></div>
    <div class="accent" id="accent"></div>
    <div class="info-bottom" id="info-bottom"></div>
  </div>

</div>

<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  function get(k, d) { var v = p.get(k); return (v === null || v === "") ? d : v; }
  function bool(k, d) { var v = p.get(k); if (v === null) return d; return v === "1" || v === "true"; }
  function num(k, d) { var v = p.get(k); if (v === null || v === "") return d; var n = parseFloat(v); return isNaN(n) ? d : n; }

  var logo = get('logo', 'assets/logo.png');
  var hero1 = get('hero1', 'assets/hero-sample.png');
  var hero2 = get('hero2', 'assets/hero-sample.png');
  var hero3 = get('hero3', 'assets/hero-sample.png');
  var hero4 = get('hero4', 'assets/hero-sample.png');

  var cap1 = get('caption1', 'Maracujá');
  var cap2 = get('caption2', 'Lima · Cachaça');
  var cap3 = get('caption3', 'Mel do Ribatejo');
  var cap4 = get('caption4', 'Para a Mesa');

  var title = get('title', 'Caipirinha de Maracujá');
  var accent = get('accent', 'Sem pressa. Com rio.');
  var infoBottom = get('info_bottom', 'Valada do Ribatejo · sorio.pt');
  var editorialLabel = get('editorial_label', 'Verão Sem Pressa · Ritual');

  var showLogo = bool('show_logo', true);
  var showLabel = bool('show_label', true);
  var showAccent = bool('show_accent', true);
  var showHairline = bool('show_hairline', true);
  var showInfoBottom = bool('show_info_bottom', true);

  var titleSize = num('title_size', 64);

  document.getElementById('logo').src = logo;
  if (!showLogo) document.getElementById('logo').classList.add('hidden');
  document.getElementById('editorial-label').textContent = editorialLabel;
  if (!showLabel) document.getElementById('editorial-label').classList.add('hidden');

  document.getElementById('img-1').style.backgroundImage = 'url("' + hero1 + '")';
  document.getElementById('img-2').style.backgroundImage = 'url("' + hero2 + '")';
  document.getElementById('img-3').style.backgroundImage = 'url("' + hero3 + '")';
  document.getElementById('img-4').style.backgroundImage = 'url("' + hero4 + '")';
  document.getElementById('cap-1').textContent = cap1;
  document.getElementById('cap-2').textContent = cap2;
  document.getElementById('cap-3').textContent = cap3;
  document.getElementById('cap-4').textContent = cap4;

  var titleEl = document.getElementById('title');
  titleEl.innerHTML = title.split('|').map(function(l){
    return l.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }).join('<br>');
  titleEl.style.fontSize = titleSize + 'px';
  document.getElementById('accent').textContent = accent;
  document.getElementById('info-bottom').textContent = infoBottom;

  if (!showAccent) document.getElementById('accent').classList.add('hidden');
  if (!showHairline) document.getElementById('hairline').classList.add('hidden');
  if (!showInfoBottom) document.getElementById('info-bottom').classList.add('hidden');
})();
</script>
</body>
</html>
