<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Só Rio · F01 Product Hero Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="_shared/branding.js"></script>
<script src="_shared/editor.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background:#1C1C1A;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }
  .canvas {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: #1C1C1A;
    font-family: 'Inter', sans-serif;
    color: #F6F1E7;
  }
  /* HERO full-bleed — fills entire canvas. Spec families.md F01: "hero photo
     full-bleed, dramatic typography stacked over hero with subtle gradient
     overlay". Bug 2026-05-03 (Gonçalo): template tinha insets 80/180/220 que
     criavam moldura cinza/preta visível em volta da foto. Removidos. Masthead
     e caption ficam over-laid via z-index e overlay gradient. */
  .hero {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
  }
  /* MASTHEAD-TOP — extra thin, max restraint */
  .masthead-top {
    position: absolute;
    top: 60px; left: 80px; right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 3;
    height: 80px;
  }
  .logo {
    width: 130px;
    height: auto;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.35));
  }
  .editorial-label {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.42em;
    color: #C89853;
    text-transform: uppercase;
    text-align: right;
  }
  /* CAPTION (bottom, thin) */
  .caption {
    position: absolute;
    bottom: 80px; left: 80px; right: 80px;
    z-index: 3;
    text-align: center;
  }
  .info {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 17px;
    letter-spacing: 0.34em;
    color: #F6F1E7;
    text-transform: uppercase;
    opacity: 0.92;
  }
  /* Title is Cormorant italic medium — NOT Oswald display. F01 lets hero breathe. */
  .editorial-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 56px;
    line-height: 1;
    color: #F6F1E7;
    margin: 18px 0 14px;
    letter-spacing: 0.005em;
  }
  .accent {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 26px;
    color: #C89853;
    margin-top: 6px;
  }
  .hairline {
    width: 38px;
    height: 1px;
    background: #C89853;
    margin: 0 auto 16px;
    opacity: 0.7;
  }
  .info-bottom {
    margin-top: 22px;
    color: #C89853;
    font-size: 13px;
    letter-spacing: 0.42em;
  }
  /* Overlay vignette — assegura legibilidade do masthead-top (logo+label) e
     caption (title+accent+info) sobre o hero full-bleed. Reforçado em
     2026-05-03 quando hero passou a inset:0; antes era subtle porque hero
     tinha molduras 80/180/220. Stops:
       0%   — top: dark band 0.32 para masthead (logo+editorial-label)
       15%  — fade to clean photo
       65%  — fade to dark
       100% — bottom: dark band 0.55 para caption (title+accent+info-bottom) */
  .overlay {
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      linear-gradient(180deg,
        rgba(28,28,26,0.32) 0%,
        rgba(28,28,26,0.00) 15%,
        rgba(28,28,26,0.00) 65%,
        rgba(28,28,26,0.55) 100%);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="canvas">
  <div class="hero" id="hero" data-layer="hero"></div>
  <div class="overlay" id="overlay"></div>

  <div class="masthead-top">
    <img class="logo" id="logo" data-layer="logo" alt="Só Rio">
    <div class="editorial-label" id="editorial-label"></div>
  </div>

  <div class="caption">
    <div class="info" id="info-top" data-layer="info_top"></div>
    <div class="editorial-title" id="title" data-layer="title"></div>
    <div class="hairline" id="hairline"></div>
    <div class="accent" id="accent" data-layer="accent"></div>
    <div class="info info-bottom" id="info-bottom" data-layer="info_bottom"></div>
  </div>
</div>

<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  function get(k, d) { var v = p.get(k); return (v === null || v === "") ? d : v; }
  function bool(k, d) { var v = p.get(k); if (v === null) return d; return v === "1" || v === "true"; }
  function num(k, d) { var v = p.get(k); if (v === null || v === "") return d; var n = parseFloat(v); return isNaN(n) ? d : n; }

  var hero = get('hero', 'assets/hero-sample.png');
  var logo = get('logo', 'assets/logo.png');

  var title = get('title', 'Caipirinha de Maracujá');
  var infoTop = get('info_top', 'Mesa do Chef');
  var accent = get('accent', 'Sem pressa. Com rio.');
  var infoBottom = get('info_bottom', 'Valada do Ribatejo · sorio.pt');
  var editorialLabel = get('editorial_label', 'Verão Sem Pressa · Vol. IV');

  var showLogo = bool('show_logo', true);
  var showHairline = bool('show_hairline', true);
  var showAccent = bool('show_accent', true);
  var showInfoTop = bool('show_info_top', true);
  var showInfoBottom = bool('show_info_bottom', true);
  var showLabel = bool('show_label', true);

  var titleSize = num('title_size', 56);
  var accentSize = num('accent_size', 26);
  var heroPosition = get('hero_position', 'center');

  // Canvas dimensions + scale factors — necessário para applyBranding e applyEditor.
  // Sem estas declarações, applyBranding throws ReferenceError, o script crasha,
  // applyEditor() nunca corre, e o postMessage `editor:set_hero` da Boldy fica sem
  // listener — resultado: hero default sample.png em vez do hero real do run.
  var format = get('format', '1080x1350');
  var fmtParts = format.split('x');
  var canvasW = parseInt(fmtParts[0], 10) || 1080;
  var canvasH = parseInt(fmtParts[1], 10) || 1350;
  var heightScale = canvasH / 1350;
  var widthScale = canvasW / 1080;
  var selo = get('selo', '');

  // Apply canvas dimensions to html/body/canvas — CSS tem 1350 hardcoded como
  // default 4:5; sem este override, format=1080x1920 deixa o conteúdo a 1350px
  // e cria faixa preta abaixo do hero (~570px sem usar). User reportou em
  // 2026-05-03 com Limonada Framboesa F01 9:16.
  document.documentElement.style.width = canvasW + 'px';
  document.documentElement.style.height = canvasH + 'px';
  document.body.style.width = canvasW + 'px';
  document.body.style.height = canvasH + 'px';
  var canvasEl = document.querySelector('.canvas');
  if (canvasEl) {
    canvasEl.style.width = canvasW + 'px';
    canvasEl.style.height = canvasH + 'px';
  }

  document.getElementById('hero').style.backgroundImage = 'url("' + hero + '")';
  document.getElementById('hero').style.backgroundPosition = heroPosition;
  document.getElementById('logo').src = logo;
  if (!showLogo) document.getElementById('logo').classList.add('hidden');

  document.getElementById('editorial-label').textContent = editorialLabel;
  if (!showLabel) document.getElementById('editorial-label').classList.add('hidden');

  // Info-top — dynamic letter-spacing/font-size shrink quando texto excede width
  // Caption width = canvasW - 2*sideMargin (80px). Default letter-spacing 0.34em
  // a 17px = ~17.78px/char. >50 chars rebenta com width 920px em 9:16. Diminui.
  var infoTopEl = document.getElementById('info-top');
  infoTopEl.textContent = infoTop;
  if (infoTop && infoTop.length > 36) {
    var ls = infoTop.length > 50 ? '0.18em' : (infoTop.length > 42 ? '0.24em' : '0.30em');
    var fs = infoTop.length > 50 ? '14px' : (infoTop.length > 42 ? '15px' : '16px');
    infoTopEl.style.letterSpacing = ls;
    infoTopEl.style.fontSize = fs;
  }

  // Title — converter `|` em line break (convenção do Decisor para forçar quebra
  // visual no rendering). Sem isto, "Limonada Framboesa|e Gengibre" rendia com
  // pipe literal no meio. Usa innerHTML + escape para segurança.
  var titleEl = document.getElementById('title');
  if (title && title.indexOf('|') !== -1) {
    var safe = title.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    titleEl.innerHTML = safe.replace(/\s*\|\s*/g, '<br>');
  } else {
    titleEl.textContent = title;
  }
  titleEl.style.fontSize = titleSize + 'px';
  document.getElementById('accent').textContent = accent;
  document.getElementById('accent').style.fontSize = accentSize + 'px';
  document.getElementById('info-bottom').textContent = infoBottom;

  if (!showHairline) document.getElementById('hairline').classList.add('hidden');
  if (!showAccent) document.getElementById('accent').classList.add('hidden');
  if (!showInfoTop) document.getElementById('info-top').classList.add('hidden');
  if (!showInfoBottom) document.getElementById('info-bottom').classList.add('hidden');
  // Universal branding override — lê logo_position/scale + selo_position/scale do URL
  if (typeof applyBranding === 'function') {
    applyBranding({ canvasW, canvasH, heightScale, widthScale, p, logo, selo });
  }

  // Universal editor module — z-index, cor por campo, transforms (x/y/rot/scale)
  // + postMessage protocol para Boldy editor interactivo.
  if (typeof applyEditor === 'function') {
    applyEditor({
      canvasW: canvasW,  // dynamic (era hardcoded 1080)
      canvasH: canvasH,  // dynamic (era hardcoded 1350) — sem isto, editor mode
                          // em formato 9:16/1:1 calcula hit-rects contra 1350 e
                          // os layers ficam inclickáveis nas zonas extra
      p: p,
      layers: ['hero', 'title', 'accent', 'info_top', 'info_bottom', 'logo'],
    });
  }
})();
</script>
</body>
</html>
