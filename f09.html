<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Só Rio · F09 Negative Space Float</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Cormorant+Garamond:ital,wght@1,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; background: #D9C8A8; }
  .canvas { width: 1080px; height: 1350px; position: relative; overflow: hidden; font-family: 'Inter', sans-serif; }

  .hero {
    position: absolute;
    z-index: 2;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    filter: drop-shadow(0 12px 36px rgba(0,0,0,0.20));
  }
  .logo {
    position: absolute; top: 60px; left: 60px;
    z-index: 4; width: 150px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
  }
  .selo {
    position: absolute;
    z-index: 4;
    width: 130px; height: 130px;
  }

  .typo-zone {
    position: absolute;
    z-index: 3;
    color: #1C1C1A;
  }
  .info-top {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0.85;
  }
  .display-float {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    line-height: 0.92;
    text-transform: uppercase;
  }
  .accent {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    line-height: 1.1;
    color: #6B4A2D;
    margin-top: 22px;
  }
  .info-bottom {
    position: absolute;
    z-index: 3;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    letter-spacing: 0.40em;
    text-transform: uppercase;
    color: #6B4A2D;
    opacity: 0.78;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="canvas" id="canvas">
  <div class="hero" id="hero"></div>
  <img class="logo" id="logo" alt="Só Rio">
  <img class="selo" id="selo" alt="Selo Só Rio">
  <div class="typo-zone" id="typo-zone">
    <div class="info-top" id="info-top"></div>
    <div class="display-float" id="display-float"></div>
    <div class="accent" id="accent"></div>
  </div>
  <div class="info-bottom" id="info-bottom"></div>
</div>

<script>
(function() {
  var p = new URLSearchParams(window.location.search);
  function get(k, d) { var v = p.get(k); return (v === null || v === "") ? d : v; }
  function bool(k, d) { var v = p.get(k); if (v === null) return d; return v === "1" || v === "true"; }
  function num(k, d) { var v = p.get(k); if (v === null || v === "") return d; var n = parseFloat(v); return isNaN(n) ? d : n; }

  var format = get('format', '1080x1350');
  var fmtParts = format.split('x');
  var canvasW = parseInt(fmtParts[0], 10) || 1080;
  var canvasH = parseInt(fmtParts[1], 10) || 1350;
  document.documentElement.style.width = canvasW + 'px';
  document.documentElement.style.height = canvasH + 'px';
  document.body.style.width = canvasW + 'px';
  document.body.style.height = canvasH + 'px';
  var canvas = document.getElementById('canvas');
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  var heightScale = canvasH / 1350;
  var widthScale = canvasW / 1080;

  var hero = get('hero', 'assets/hero-sample.png');
  var logo = get('logo', 'assets/logo.png');
  var selo = get('selo', 'assets/selo-default.png');
  var title = get('title', 'Cloud|Dance');
  var infoTop = get('info_top', 'Vodka · Pera · Bianco · Baunilha');
  var accent = get('accent', 'Calmo, dourado, nosso.');
  var infoBottom = get('info_bottom', 'Valada do Ribatejo · sorio.pt');

  var bgColor = get('bg_color', '#D9C8A8');
  var subjectScale = num('subject_scale', 0.42);
  subjectScale = Math.max(0.30, Math.min(0.55, subjectScale));
  // subject_position: 'top-left' | 'top-right' | 'bottom-left' | 'bottom-right'
  var subjectPosition = get('subject_position', 'bottom-right');
  var displaySize = num('display_size', Math.round(90 * heightScale));
  var accentSize = num('accent_size', Math.round(32 * heightScale));

  var showLogo = bool('show_logo', true);
  var showSelo = bool('show_selo', true);
  var showInfoTop = bool('show_info_top', true);
  var showAccent = bool('show_accent', true);
  var showInfoBottom = bool('show_info_bottom', true);

  document.body.style.background = bgColor;
  canvas.style.background = bgColor;

  // Hero — small floating subject
  var heroEl = document.getElementById('hero');
  heroEl.style.backgroundImage = 'url("' + hero + '")';
  var subjectW = Math.round(canvasW * subjectScale);
  var subjectH = Math.round(canvasH * subjectScale * 0.95);
  heroEl.style.width = subjectW + 'px';
  heroEl.style.height = subjectH + 'px';

  var subjectMargin = Math.round(80 * widthScale);
  var typoZoneEl = document.getElementById('typo-zone');
  typoZoneEl.style.width = Math.round(canvasW * 0.42) + 'px';

  // Place subject + type in opposite corners
  if (subjectPosition === 'bottom-right') {
    heroEl.style.right = subjectMargin + 'px';
    heroEl.style.bottom = Math.round(120 * heightScale) + 'px';
    typoZoneEl.style.top = Math.round(canvasH * 0.20) + 'px';
    typoZoneEl.style.left = subjectMargin + 'px';
  } else if (subjectPosition === 'bottom-left') {
    heroEl.style.left = subjectMargin + 'px';
    heroEl.style.bottom = Math.round(120 * heightScale) + 'px';
    typoZoneEl.style.top = Math.round(canvasH * 0.20) + 'px';
    typoZoneEl.style.right = subjectMargin + 'px';
    typoZoneEl.style.textAlign = 'right';
  } else if (subjectPosition === 'top-right') {
    heroEl.style.right = subjectMargin + 'px';
    heroEl.style.top = Math.round(canvasH * 0.18) + 'px';
    typoZoneEl.style.bottom = Math.round(180 * heightScale) + 'px';
    typoZoneEl.style.left = subjectMargin + 'px';
  } else {
    heroEl.style.left = subjectMargin + 'px';
    heroEl.style.top = Math.round(canvasH * 0.18) + 'px';
    typoZoneEl.style.bottom = Math.round(180 * heightScale) + 'px';
    typoZoneEl.style.right = subjectMargin + 'px';
    typoZoneEl.style.textAlign = 'right';
  }

  // Logo + selo
  var logoEl = document.getElementById('logo');
  var seloEl = document.getElementById('selo');
  logoEl.src = logo;
  logoEl.style.width = Math.round(150 * heightScale) + 'px';
  logoEl.style.top = Math.round(60 * heightScale) + 'px';
  logoEl.style.left = Math.round(60 * widthScale) + 'px';
  seloEl.src = selo;
  seloEl.style.width = Math.round(130 * heightScale) + 'px';
  seloEl.style.height = Math.round(130 * heightScale) + 'px';
  // Selo small inline near typo zone (bottom of zone)
  seloEl.style.top = Math.round(60 * heightScale) + 'px';
  seloEl.style.right = Math.round(60 * widthScale) + 'px';
  if (!showLogo) logoEl.classList.add('hidden');
  if (!showSelo) seloEl.classList.add('hidden');

  document.getElementById('info-top').textContent = infoTop;
  document.getElementById('info-top').style.fontSize = Math.round(16 * heightScale) + 'px';
  var displayEl = document.getElementById('display-float');
  displayEl.innerHTML = title.split('|').map(function(l){
    return l.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }).join('<br>');
  displayEl.style.fontSize = displaySize + 'px';
  document.getElementById('accent').textContent = accent;
  document.getElementById('accent').style.fontSize = accentSize + 'px';

  var infoBottomEl = document.getElementById('info-bottom');
  infoBottomEl.textContent = infoBottom;
  infoBottomEl.style.fontSize = Math.round(13 * heightScale) + 'px';
  infoBottomEl.style.bottom = Math.round(60 * heightScale) + 'px';
  infoBottomEl.style.left = '0';
  infoBottomEl.style.right = '0';
  infoBottomEl.style.textAlign = 'center';

  if (!showInfoTop) document.getElementById('info-top').classList.add('hidden');
  if (!showAccent) document.getElementById('accent').classList.add('hidden');
  if (!showInfoBottom) infoBottomEl.classList.add('hidden');
})();
</script>
</body>
</html>
